name: 发财就手每日生成
on:
  schedule:
    - cron: '0 14 * * *'   # UTC 14:00 = 北京时间 22:00（开奖后立即生成）
    - cron: '0 22 * * *'   # UTC 22:00 = 北京时间 06:00（次日早晨补跑，兜底）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 生成新一期8级递减序列
        run: python3 scripts/generate.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
