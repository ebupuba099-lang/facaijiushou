name: 发财就手每日生成
on:
  schedule:
    - cron: '29 20 * * *'  # UTC 20:29 = 北京时间 04:29
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 生成新一期8级递减序列
        run: python3 scripts/generate.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
