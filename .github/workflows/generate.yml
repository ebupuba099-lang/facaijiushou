name: 发财就手每日生成
on:
  schedule:
    - cron: '29 20 * * *'   # UTC 20:29 = 北京时间 04:29（计算并刷新下一期）
    - cron: '0 23 * * *'   # UTC 23:00 = 北京时间 07:00（早晨补跑兜底）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 生成新一期8级递减序列
        run: python3 scripts/generate.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
