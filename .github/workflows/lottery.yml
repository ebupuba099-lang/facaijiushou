name: 发财就手开奖填入
on:
  schedule:
    - cron: '0 14 * * *'   # UTC 14:00 = 北京时间 22:00（开奖后立即抓取）
    - cron: '0 22 * * *'   # UTC 22:00 = 北京时间 06:00（次日补抓，兜底）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lottery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 抓取开奖结果并填入
        run: python3 scripts/lottery.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
